<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox (Queue View) — Maestro Command Centre</title>
  <link href="https://framerusercontent.com/images/IpIhMdzyXKNL7tkqGF51UsTfpk.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/images/ps9lnUCtneok5DwSUeXm6INQAw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/ai-assistant.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/data.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/interactions.js"></script>
  <script src="../js/ai-assistant.js"></script>
  <script src="../js/responsive.js"></script>
</head>
<body class="antialiased">

<!-- Sidebar -->
<div id="sidebar-root"></div>

<!-- Main content (shifts right based on sidebar width) -->
<div id="main-wrapper" class="transition-all duration-200" style="margin-left:240px;">
  <div id="inbox-layout" class="flex h-screen overflow-hidden">

    <!-- ============ LEFT: SLA QUEUE (320px) ============ -->
    <div id="conv-list-pane" class="flex flex-col border-r transition-theme" style="width:320px;min-width:320px;background:var(--bg-surface);border-color:var(--border);">
      <!-- List header -->
      <div class="px-4 py-3 border-b transition-theme" style="border-color:var(--border);">
        <div class="flex items-center justify-between mb-3">
          <h1 class="text-base font-semibold" style="color:var(--text-primary);">Inbox</h1>
          <div class="flex items-center gap-2">
            <!-- View toggle: compact / cards / queue -->
            <div class="flex items-center border rounded-md overflow-hidden" style="border-color:var(--border);">
              <a href="inbox-compact.html" class="view-toggle px-2 py-1" title="Compact list" style="color:var(--text-muted);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </a>
              <a href="inbox-cards.html" class="view-toggle px-2 py-1" title="Card view" style="color:var(--text-muted);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </a>
              <button class="view-toggle active px-2 py-1" data-view="queue" title="Queue view" style="background:var(--bg-active);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3"/><path d="m15 9 6-6"/></svg>
              </button>
            </div>
            <a href="onboarding.html" class="btn-gold" style="padding:5px 10px;font-size:11px;">+ Client</a>
          </div>
        </div>
        <!-- Search -->
        <input class="input" placeholder="Search conversations..." style="font-size:12px;padding:6px 10px;">
        <!-- Filters -->
        <div class="flex gap-2 mt-2">
          <select id="filter-type" class="input text-xs" style="padding:4px 8px;" onchange="renderQueue()">
            <option value="">All Threads</option>
            <option value="trip">Trip Threads</option>
            <option value="general">General Threads</option>
          </select>
          <select id="filter-assigned" class="input text-xs" style="padding:4px 8px;" onchange="renderQueue()">
            <option value="">All Assigned</option>
            <option value="unassigned">Unassigned Only</option>
          </select>
        </div>
      </div>

      <!-- Swim lanes (scrollable) -->
      <div id="queue-container" class="flex-1 overflow-y-auto" style="background:var(--bg-surface);"></div>
    </div>

    <!-- ============ CENTER: Conversation Thread ============ -->
    <div id="thread-pane" class="flex flex-col flex-1" style="background:var(--bg-app);">
      <!-- Conversation header -->
      <div class="flex items-center justify-between px-6 py-3 border-b transition-theme" style="border-color:var(--border);background:var(--bg-surface);">
        <div class="flex items-center gap-3">
          <div class="relative" id="agent-assign-wrapper">
            <div id="header-agents" class="flex items-center cursor-pointer" onclick="toggleAssignDropdown()" title="Manage assignment" style="margin-right:4px;">
              <!-- Agent avatars rendered dynamically -->
            </div>
            <!-- Assignment dropdown -->
            <div id="assign-dropdown" class="absolute left-0 top-full mt-1 w-64 rounded-lg border shadow-lg py-1 hidden" style="background:var(--bg-surface);border-color:var(--border);z-index:50;">
              <div class="px-3 py-1.5 text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">Assign to</div>
              <div id="assign-agent-list"></div>
              <div class="border-t my-1" style="border-color:var(--border);"></div>
              <div class="px-3 py-1.5 cursor-pointer text-xs hover:opacity-80" style="color:var(--text-muted);" onclick="removeAllAssignments()">Remove all assignments</div>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-2">
              <span id="header-name" class="text-sm font-semibold" style="color:var(--text-primary);">Twoflower Lao</span>
              <span class="badge badge-gold">VIP</span>
              <span id="header-sla-badge" class="text-xs px-2 py-0.5 rounded" style="background:var(--error);color:#fff;">BREACHED -15m</span>
            </div>
            <div class="flex items-center gap-2 mt-0.5">
              <span id="header-trip" class="text-xs" style="color:var(--text-secondary);">Paris Anniversary Trip · WhatsApp</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn-ghost text-xs">Resolve</button>
          <button id="toggle-context" class="btn-ghost text-xs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages-container" class="flex-1 overflow-y-auto px-6 py-4"></div>

      <!-- Message composer -->
      <div class="px-6 py-3 border-t transition-theme" style="border-color:var(--border);background:var(--bg-surface);">
        <!-- Rich text toolbar -->
        <div class="rounded-lg overflow-hidden" style="border:1px solid var(--border);">
          <div class="flex items-center gap-1 px-2 border-b" style="height:36px;background:var(--bg-surface-alt);border-color:var(--border);">
            <!-- Left: formatting buttons -->
            <button type="button" class="p-1 rounded transition-colors" style="color:var(--text-secondary);" title="Bold">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <button type="button" class="p-1 rounded transition-colors" style="color:var(--text-secondary);" title="Italic">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
            </button>
            <button type="button" class="p-1 rounded transition-colors" style="color:var(--text-secondary);" title="Strikethrough">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 19h4v-3h-4v3zM5 4v3h6v3h2V7h6V4H5zM3 14h18v-2H3v2z"/></svg>
            </button>
            <div class="w-px h-4 mx-0.5" style="background:var(--border);"></div>
            <button type="button" class="p-1 rounded transition-colors" style="color:var(--text-secondary);" title="Bullet list">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
            </button>
            <!-- Right: utility buttons -->
            <div class="ml-auto flex items-center gap-0.5">
              <button type="button" class="p-1.5 rounded transition-colors" style="color:var(--text-muted);" title="Attach file">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.586-6.586a4 4 0 00-5.656-5.656l-6.586 6.586a6 6 0 008.484 8.484l6.586-6.586"/></svg>
              </button>
              <button type="button" class="p-1.5 rounded transition-colors" style="color:var(--text-muted);" title="Emoji">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
              </button>
            </div>
          </div>
          <textarea id="composer-textarea" rows="3"
            class="w-full text-sm px-3 py-2.5 focus:outline-none resize-none leading-relaxed"
            style="background:var(--bg-surface);color:var(--text-primary);"
            placeholder="Type your message..."></textarea>
        </div>

        <!-- Action buttons -->
        <div class="flex items-center justify-between mt-2">
          <div class="flex items-center gap-2">
            <button class="btn-ghost text-xs flex items-center justify-center gap-1" onclick="openTaskModal()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
              Create Task
            </button>
            <button class="btn-ghost text-xs flex items-center justify-center gap-1" onclick="openFlightSearchModal()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
              Search Flights
            </button>
            <button class="btn-ghost text-xs flex items-center justify-center gap-1" onclick="openHotelSearchModal()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2Z"/><path d="m9 16 .348-.24c1.465-1.013 3.84-1.013 5.304 0L15 16"/><path d="M8 7h.01"/><path d="M16 7h.01"/></svg>
              Search Hotels
            </button>
            <button class="btn-ghost text-xs flex items-center justify-center gap-1" onclick="if(currentPrimaryClientId)window.location.href='client-detail?id='+currentPrimaryClientId">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              View Profile
            </button>
          </div>
          <button class="btn-primary text-xs px-4 py-1.5" onclick="simulateSend('composer-textarea')">Send</button>
        </div>
      </div>

      <!-- AI Assist -->
      <div class="p-4">
        <div class="ai-section-header" style="padding:0 0 6px 0;">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="var(--gold)"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
          <span>AI Assist</span>
        </div>
        <div id="inbox-ai-chips" class="ai-chips"></div>
      </div>
    </div>

    <!-- ============ RIGHT: Context Panel ============ -->
    <div id="context-panel" class="flex flex-col border-l transition-theme" style="width:340px;min-width:340px;background:var(--bg-surface);border-color:var(--border);">
      <!-- Header -->
      <div class="px-4 py-3 border-b transition-theme" style="border-color:var(--border);">
        <h2 id="context-panel-title" class="text-sm font-semibold" style="color:var(--text-primary);">Trip Context</h2>
      </div>

      <!-- Unassigned banner -->
      <div id="unassigned-banner" class="hidden px-4 py-2 border-b" style="background:var(--warning-bg);border-color:var(--border);">
        <div class="flex items-center justify-between">
          <span class="text-xs font-medium" style="color:var(--warning);">This conversation is unassigned</span>
          <button class="text-xs font-semibold px-2 py-0.5 rounded" style="background:var(--warning);color:#fff;" onclick="assignToMe()">Assign to me</button>
        </div>
      </div>

      <!-- Scrollable content -->
      <div class="flex-1 overflow-y-auto px-4 py-4" id="context-content">
        <!-- Travelers section (trip threads) -->
        <div id="travelers-wrapper" class="mb-4">
          <button class="flex items-center justify-between w-full text-left" onclick="toggleSection('travelers-section')">
            <span id="travelers-header" class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">TRAVELERS (0)</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="travelers-section" class="mt-2 space-y-2"></div>
        </div>

        <!-- Components section (trip threads) -->
        <div id="components-wrapper" class="mb-4">
          <button class="flex items-center justify-between w-full text-left" onclick="toggleSection('components-section')">
            <span id="components-header" class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">COMPONENTS (0)</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="components-section" class="mt-2 space-y-2"></div>
        </div>

        <!-- Tasks section -->
        <div id="tasks-wrapper" class="mb-4">
          <button class="flex items-center justify-between w-full text-left" onclick="toggleSection('tasks-section')">
            <span id="tasks-header" class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">TASKS (0)</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="tasks-section" class="mt-2 space-y-2"></div>
        </div>

        <!-- Household threads section (general threads) -->
        <div id="threads-wrapper" class="mb-4 hidden">
          <button class="flex items-center justify-between w-full text-left" onclick="toggleSection('threads-section')">
            <span id="threads-header" class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">HOUSEHOLD THREADS</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="threads-section" class="mt-2 space-y-1"></div>
        </div>

        <!-- AI History section -->
        <div id="ai-history-wrapper" class="mb-4">
          <button class="flex items-center justify-between w-full text-left" onclick="toggleSection('ai-history-section')">
            <span class="text-xs font-semibold uppercase tracking-wide flex items-center gap-1.5" style="color:var(--text-muted);">
              <svg viewBox="0 0 24 24" width="10" height="10" fill="var(--gold)"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
              Maestro AI
            </span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="ai-history-section" class="mt-2 space-y-0">
            <div id="inbox-ai-thread-list" class="space-y-0"></div>
            <a id="inbox-ai-view-all" href="ai-history" class="text-xs mt-2 inline-block" style="color:var(--gold);">View all AI conversations</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Command Palette -->
<div id="cmd-palette-root"></div>

<script>
  // ---- State ----
  let selectedConvId = null;
  let currentPrimaryClientId = null;

  // ---- Render sidebar ----
  document.addEventListener('DOMContentLoaded', () => {
    MaestroNav.render('sidebar-root');
    updateMainMargin();
    renderQueue();
    renderMessages();
    renderContextPanel();
    document.getElementById('cmd-palette-root').innerHTML = renderCommandPalette();

    // Context panel toggle
    document.getElementById('toggle-context').addEventListener('click', () => {
      const panel = document.getElementById('context-panel');
      if (panel.style.display === 'none') {
        panel.style.display = '';
      } else {
        panel.style.display = 'none';
      }
    });
  });

  // Observe sidebar changes
  const observer = new MutationObserver(updateMainMargin);
  setTimeout(() => {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) observer.observe(sidebar, { attributes: true, attributeFilter: ['class'] });
  }, 100);

  function updateMainMargin() {
    const w = MaestroNav.getSidebarWidth();
    document.getElementById('main-wrapper').style.marginLeft = w + 'px';
  }

  // ---- Queue rendering (swim lanes by SLA status) ----
  function renderQueue(skipAutoSelect) {
    // Apply filters
    const filterType = document.getElementById('filter-type')?.value || '';
    const filterAssigned = document.getElementById('filter-assigned')?.value || '';

    let filtered = CONVERSATIONS;
    if (filterType) filtered = filtered.filter(c => c.threadType === filterType);
    if (filterAssigned === 'unassigned') filtered = filtered.filter(c => !c.assignedTo);

    // Split into unassigned and assigned conversations
    const unassigned = filtered.filter(c => !c.assignedTo);
    const assigned = filtered.filter(c => c.assignedTo);

    // Group assigned by SLA status
    const breached = assigned.filter(c => c.slaStatus === 'breached' || c.slaStatus === 'critical');
    const warning = assigned.filter(c => c.slaStatus === 'warning');
    const healthy = assigned.filter(c => c.slaStatus === 'healthy');

    const container = document.getElementById('queue-container');
    container.innerHTML = `
      ${unassigned.length > 0 ? renderSwimLane('Unassigned', unassigned, 'var(--warning)', 'unassigned') : ''}
      ${renderSwimLane('Needs Response', breached, 'var(--error)', 'error')}
      ${renderSwimLane('Warning', warning, 'var(--warning)', 'warning')}
      ${renderSwimLane('On Track', healthy, 'var(--success)', 'success')}
    `;

    // Auto-select from URL param or most urgent on first render
    if (!skipAutoSelect && !selectedConvId) {
      const urlParams = new URLSearchParams(window.location.search);
      const convParam = urlParams.get('conv');
      if (convParam && CONVERSATIONS.find(c => c.id === convParam)) {
        selectConversation(convParam);
      } else {
        const first = unassigned[0] || breached[0] || warning[0] || healthy[0];
        if (first) selectConversation(first.id);
      }
    }
  }

  function renderSwimLane(title, conversations, color, type) {
    const count = conversations.length;
    const badgeBg = type === 'error' ? 'var(--error)' : type === 'warning' ? 'var(--warning)' : 'var(--success)';

    return `
      <div class="mb-4">
        <!-- Lane header -->
        <div class="flex items-center gap-2 px-4 py-2 border-b transition-theme" style="border-color:var(--border);">
          <div class="w-2 h-2 rounded-full" style="background:${color};"></div>
          <span class="text-xs font-semibold uppercase tracking-wide flex-1" style="color:var(--text-primary);">${title}</span>
          <span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${badgeBg};color:#fff;">${count}</span>
        </div>
        <!-- Lane items -->
        <div class="space-y-0">
          ${conversations.map(conv => renderQueueItem(conv, type)).join('')}
        </div>
      </div>
    `;
  }

  function renderQueueItem(conv, type) {
    const household = getHousehold(conv.householdId);
    const primaryClient = getClient(household.primaryClientId);
    const trip = getTrip(conv.tripId);
    const isActive = selectedConvId === conv.id;
    const agents = getConversationAgents(conv.id);

    // Format countdown
    let countdownText = '';
    let countdownColor = '';
    let pulseClass = '';

    if (conv.slaStatus === 'breached') {
      countdownText = `BREACHED -${Math.abs(conv.slaMinutes)}m`;
      countdownColor = 'var(--error)';
      pulseClass = 'sla-breached';
    } else if (conv.slaStatus === 'critical') {
      countdownText = `${conv.slaMinutes}m`;
      countdownColor = 'var(--error)';
    } else if (conv.slaStatus === 'warning') {
      countdownText = `${conv.slaMinutes}m left`;
      countdownColor = 'var(--warning)';
    } else {
      countdownText = conv.slaMinutes >= 120 ? '2h+' : `${conv.slaMinutes}m`;
      countdownColor = 'var(--success)';
    }

    const borderColor = type === 'unassigned' ? 'var(--warning)' : type === 'error' ? 'var(--error)' : type === 'warning' ? 'var(--warning)' : 'var(--success)';
    const unassignedClass = type === 'unassigned' ? 'conv-unassigned' : '';

    // Render agent avatars (overlapping cluster)
    let agentAvatarsHtml = '';
    if (agents.length === 0) {
      // Unassigned: dashed circle with ?
      agentAvatarsHtml = `<div class="flex items-center justify-center" style="width:20px;height:20px;border:1.5px dashed var(--warning);border-radius:50%;color:var(--warning);font-size:11px;font-weight:600;">?</div>`;
    } else {
      agentAvatarsHtml = `<div class="flex items-center" style="margin-left:-4px;">` +
        agents.slice(0, 3).map((agent, idx) =>
          `<span class="avatar" style="background:${agent.color};color:#fff;font-size:8px;width:20px;height:20px;margin-left:${idx > 0 ? '-6px' : '0'};border:1.5px solid var(--bg-surface);z-index:${10 - idx};" title="${agent.name}">${agent.initials}</span>`
        ).join('') +
        (agents.length > 3 ? `<span class="text-xs font-medium" style="color:var(--text-muted);margin-left:4px;">+${agents.length - 3}</span>` : '') +
        `</div>`;
    }

    // Thread type indicator
    let threadTypeHtml = '';
    if (conv.threadType === 'general') {
      threadTypeHtml = `<span class="badge" style="background:var(--info-bg);color:var(--info);font-size:9px;">General</span>`;
    } else if (trip) {
      threadTypeHtml = `<span class="text-xs truncate" style="color:var(--text-muted);">${trip.destinations}</span>`;
    }

    return `
      <div class="conv-item flex items-center gap-2 px-4 py-2.5 cursor-pointer border-b border-l-4 transition-all duration-100 ${pulseClass} ${unassignedClass} ${isActive ? 'conv-active' : ''}"
           style="border-color:var(--border);border-left-color:${borderColor};"
           onclick="selectConversation('${conv.id}')">
        <!-- Agent avatars -->
        <div class="flex-shrink-0">
          ${agentAvatarsHtml}
        </div>
        <!-- Content -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-0.5">
            <span class="text-xs font-semibold truncate" style="color:var(--text-primary);">${household.name}</span>
            <span class="text-sm font-bold ml-2 flex-shrink-0 ${pulseClass}" style="color:${countdownColor};">${countdownText}</span>
          </div>
          <div class="flex items-center gap-1.5">
            ${threadTypeHtml}
            <span class="text-xs" style="color:var(--text-muted);">· ${conv.channel === 'whatsapp' ? 'WhatsApp' : 'SMS'}</span>
          </div>
        </div>
      </div>
    `;
  }

  // ---- Conversation selection ----
  function selectConversation(convId) {
    selectedConvId = convId;
    // Re-render queue items to update active highlight (without re-triggering auto-select)
    renderQueue(true);
    renderMessages();
    renderContextPanel();
  }

  // ---- Messages rendering ----
  function renderMessages() {
    if (!selectedConvId) return;

    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;

    const household = getHousehold(conv.householdId);
    const primaryClient = getClient(household.primaryClientId);
    const trip = getTrip(conv.tripId);
    const agents = getConversationAgents(conv.id);

    // Track current client for View Profile button
    currentPrimaryClientId = primaryClient ? primaryClient.id : null;

    // Update header agent avatars
    const headerAgentsContainer = document.getElementById('header-agents');
    if (agents.length === 0) {
      // Unassigned
      headerAgentsContainer.innerHTML = `<span class="badge" style="background:var(--warning-bg);color:var(--warning);font-size:10px;padding:3px 8px;">Unassigned</span>`;
    } else {
      headerAgentsContainer.innerHTML = `<div class="flex items-center">` +
        agents.slice(0, 3).map((agent, idx) =>
          `<span class="avatar" style="background:${agent.color};color:#fff;font-size:10px;width:28px;height:28px;margin-left:${idx > 0 ? '-8px' : '0'};border:2px solid var(--bg-surface);z-index:${10 - idx};" title="${agent.name}">${agent.initials}</span>`
        ).join('') +
        (agents.length > 3 ? `<span class="text-xs font-medium" style="color:var(--text-muted);margin-left:6px;">+${agents.length - 3}</span>` : '') +
        `</div>`;
    }

    // Update header household name
    document.getElementById('header-name').textContent = household.name;

    // Update header trip/thread type
    let tripText = '';
    if (conv.threadType === 'general') {
      tripText = 'General Inquiry';
    } else if (trip) {
      tripText = trip.destinations;
    }
    document.getElementById('header-trip').textContent = `${tripText} · ${conv.channel === 'whatsapp' ? 'WhatsApp' : 'SMS'}`;

    // Update SLA badge
    const slaBadge = document.getElementById('header-sla-badge');
    let slaBadgeText = '';
    let slaBadgeBg = '';

    if (conv.slaStatus === 'breached') {
      slaBadgeText = `BREACHED -${Math.abs(conv.slaMinutes)}m`;
      slaBadgeBg = 'var(--error)';
    } else if (conv.slaStatus === 'critical') {
      slaBadgeText = `${conv.slaMinutes}m left`;
      slaBadgeBg = 'var(--error)';
    } else if (conv.slaStatus === 'warning') {
      slaBadgeText = `${conv.slaMinutes}m left`;
      slaBadgeBg = 'var(--warning)';
    } else {
      slaBadgeText = conv.slaMinutes >= 120 ? '2h+' : `${conv.slaMinutes}m`;
      slaBadgeBg = 'var(--success)';
    }

    slaBadge.textContent = slaBadgeText;
    slaBadge.style.background = slaBadgeBg;

    // Render messages — use MESSAGES object from data.js, fall back to conv1
    const msgs = MESSAGES[conv.id] || MESSAGES.conv1 || [];
    const container = document.getElementById('messages-container');
    container.innerHTML = msgs.map(msg => {
      if (msg.sender === 'client') {
        return `
          <div class="flex gap-3 max-w-[75%] mb-3">
            <span class="avatar avatar-sm avatar-silhouette flex-shrink-0" style="margin-top:2px;">${clientAvatarSVG()}</span>
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-semibold" style="color:var(--text-primary);">${msg.senderName || household.name}</span>
                <span class="badge" style="background:var(--info-bg);color:var(--info);font-size:9px;">Client</span>
                <span class="text-xs" style="color:var(--text-muted);">${msg.time}</span>
              </div>
              <div class="msg-client px-3 py-2 text-sm" style="color:var(--text-primary);">${msg.text}</div>
            </div>
          </div>`;
      }
      if (msg.sender === 'ops') {
        const msgAgent = msg.agentId ? getAgent(msg.agentId) : (agents.length > 0 ? agents[0] : null);
        return `
          <div class="flex gap-3 justify-end mb-3">
            <div class="text-right">
              <div class="flex items-center gap-2 mb-1 justify-end">
                <span class="text-xs" style="color:var(--text-muted);">${msg.time}</span>
                <span class="text-xs font-semibold" style="color:var(--text-primary);">${msg.senderName}</span>
                <span class="badge" style="background:var(--gold-bg);color:var(--gold);font-size:9px;">Concierge</span>
              </div>
              <div class="msg-ops px-3 py-2 text-sm" style="color:var(--text-primary);">${msg.text}</div>
            </div>
            <span class="avatar avatar-sm flex-shrink-0" style="background:${msgAgent ? msgAgent.color : '#f97316'};color:#fff;margin-top:2px;">${msgAgent ? msgAgent.initials : 'CR'}</span>
          </div>`;
      }
      if (msg.sender === 'internal') {
        return `
          <div class="msg-internal px-3 py-2 text-sm mb-3">
            <div class="flex items-center gap-2 mb-1">
              <span class="badge" style="background:var(--note-bg);color:var(--note-border);font-size:9px;border:1px solid var(--note-border);">Internal Note</span>
              <span class="text-xs font-semibold" style="color:var(--text-secondary);">${msg.senderName}</span>
              <span class="text-xs" style="color:var(--text-muted);">${msg.time}</span>
            </div>
            <div style="color:var(--text-secondary);">${msg.text}</div>
          </div>`;
      }
      if (msg.sender === 'ai-draft') {
        return `
          <div class="flex gap-3 justify-end mb-3">
            <div class="text-right" style="max-width:75%;">
              <div class="flex items-center gap-2 mb-1 justify-end">
                <span class="badge" style="background:var(--gold-bg);color:var(--gold);font-size:9px;">AI Draft</span>
                <span class="badge" style="background:var(--success-bg);color:var(--success);font-size:9px;">${msg.confidence} confidence</span>
              </div>
              <div class="msg-ai-draft px-3 py-2 text-sm text-left" style="color:var(--text-primary);">${msg.text}</div>
              <div class="flex items-center gap-2 mt-2 justify-end">
                <button class="btn-gold" style="padding:4px 12px;font-size:11px;" onclick="this.closest('.flex.gap-3').remove();showToast('Message approved and sent!','success')">Approve & Send</button>
                <button class="btn-ghost" style="padding:4px 10px;font-size:11px;">Edit</button>
                <button class="btn-ghost" style="padding:4px 10px;font-size:11px;color:var(--error);">Dismiss</button>
              </div>
            </div>
            <span class="avatar avatar-sm flex-shrink-0" style="background:var(--gold);color:#000;margin-top:2px;">AI</span>
          </div>`;
      }
      return '';
    }).join('');

    // Scroll to bottom
    container.scrollTop = container.scrollHeight;
  }

  // ---- Component cards rendering ----
  // ---- Context panel rendering ----
  function renderContextPanel() {
    if (!selectedConvId) return;

    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;

    const household = getHousehold(conv.householdId);
    const trip = getTrip(conv.tripId);
    const isGeneral = conv.threadType === 'general';

    // Update panel title
    document.getElementById('context-panel-title').textContent = isGeneral ? 'Account Context' : 'Trip Context';

    // Unassigned banner
    document.getElementById('unassigned-banner').classList.toggle('hidden', !!conv.assignedTo);

    // Toggle trip vs general sections
    document.getElementById('travelers-wrapper').classList.toggle('hidden', isGeneral);
    document.getElementById('components-wrapper').classList.toggle('hidden', isGeneral);
    document.getElementById('threads-wrapper').classList.toggle('hidden', !isGeneral);

    if (isGeneral) {
      renderHouseholdThreads(conv.householdId, selectedConvId);
    } else {
      renderTravelers(trip);
      renderComponentCards(conv);
    }

    renderTasks(conv.householdId);
    renderInboxAIThreads();
  }

  function renderInboxAIThreads() {
    const listEl = document.getElementById('inbox-ai-thread-list');
    const viewAllEl = document.getElementById('inbox-ai-view-all');
    if (!listEl) return;
    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;

    let threads = [];
    if (conv.tripId && typeof getAIThreadsByTrip === 'function') threads = getAIThreadsByTrip(conv.tripId);
    if (threads.length === 0 && typeof getAIThreadsByHousehold === 'function') threads = getAIThreadsByHousehold(conv.householdId);
    threads = threads.slice(0, 3);

    if (viewAllEl) {
      viewAllEl.href = conv.tripId ? `ai-history?context=trip&id=${conv.tripId}` : `ai-history`;
    }

    if (threads.length === 0) {
      listEl.innerHTML = `<div class="text-xs py-2" style="color:var(--text-muted);">No AI conversations for this context</div>`;
      return;
    }

    listEl.innerHTML = threads.map(t => {
      const ms = Date.now() - new Date(t.updatedAt);
      const m = Math.floor(ms/60000), h = Math.floor(ms/3600000), d = Math.floor(ms/86400000);
      const time = m < 1 ? 'now' : m < 60 ? m+'m' : h < 24 ? h+'h' : d+'d';
      return `
        <a href="ai-history?thread=${t.id}" style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);text-decoration:none;" class="hover:opacity-80 transition-opacity">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="var(--gold)" style="flex-shrink:0;"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
          <span style="font-size:12px;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title || 'New conversation'}</span>
          <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">${time}</span>
        </a>
      `;
    }).join('');
  }

  function renderTravelers(trip) {
    const travelers = trip && trip.travelers ? trip.travelers.map(id => getClient(id)).filter(c => c) : [];
    const header = document.getElementById('travelers-header');
    if (header) header.textContent = `TRAVELERS (${travelers.length})`;

    const container = document.getElementById('travelers-section');
    if (travelers.length === 0) {
      container.innerHTML = '<div class="text-xs" style="color:var(--text-muted);">No travelers</div>';
      return;
    }

    const colors = ['var(--gold)', '#9333ea', '#3b82f6', '#10b981', '#f97316'];
    container.innerHTML = travelers.map((t, i) => {
      const color = t.avatarColor || colors[i % colors.length];
      return `
        <div class="flex items-center gap-2 p-2 rounded transition-theme" style="background:var(--bg-surface-alt);">
          <span class="avatar" style="background:${color};color:#fff;font-size:10px;">${t.initials}</span>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-medium" style="color:var(--text-primary);">${t.name}</div>
            <div class="text-xs" style="color:var(--text-muted);">${i === 0 ? 'Primary' : 'Companion'}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderComponentCards(conv) {
    const components = getComponentsByTrip(conv.tripId);
    const container = document.getElementById('components-section');

    const header = document.getElementById('components-header');
    if (header) header.textContent = `COMPONENTS (${components.length})`;

    const categoryColors = {
      flight: 'var(--info)', hotel: 'var(--success)', dining: '#f97316',
      experience: 'var(--gold)', transfer: 'var(--text-muted)', vip_touch: '#ec4899', train: '#8b5cf6'
    };

    const statusStyles = {
      'Working on it': { bg: 'var(--info-bg)', color: 'var(--info)' },
      'Need your input': { bg: 'var(--warning-bg)', color: 'var(--warning)' },
      'Ready for approval': { bg: 'var(--gold-bg)', color: 'var(--gold)' },
      'On hold': { bg: 'var(--bg-surface-alt)', color: 'var(--text-muted)' },
      'Confirmed': { bg: 'var(--success-bg)', color: 'var(--success)' },
      'Booked': { bg: 'var(--success-bg)', color: 'var(--success)' }
    };

    const categoryIcons = {
      hotel: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
      flight: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>',
      experience: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      dining: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>',
      transfer: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 17V7l5 5 5-5v10"/></svg>',
      vip_touch: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
      train: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="m8 19-2 3"/><path d="m18 22-2-3"/><path d="M8 15h0"/><path d="M16 15h0"/></svg>'
    };

    if (components.length === 0) {
      container.innerHTML = '<div class="text-xs" style="color:var(--text-muted);">No components</div>';
      return;
    }

    container.innerHTML = components.slice(0, 5).map(comp => {
      const ss = statusStyles[comp.clientFacingStatus] || statusStyles['Confirmed'];
      const catColor = categoryColors[comp.category] || 'var(--text-muted)';
      const icon = categoryIcons[comp.category] || categoryIcons.hotel;
      const priceDisplay = comp.pricePoints || comp.priceCash || '';
      return `
        <div class="card p-2 flex items-start gap-2 cursor-pointer" style="font-size:11px;">
          <div class="mt-0.5" style="color:${catColor};">${icon}</div>
          <div class="flex-1 min-w-0">
            <div class="font-medium truncate" style="color:var(--text-primary);">${comp.name}</div>
            <div style="color:var(--text-muted);">${comp.dates}</div>
            <div class="flex items-center gap-2 mt-1">
              <span class="badge" style="background:${ss.bg};color:${ss.color};font-size:9px;">${comp.clientFacingStatus}</span>
              ${priceDisplay ? `<span style="color:var(--text-secondary);font-weight:600;">${priceDisplay}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderTasks(householdId) {
    const tasks = TASKS ? TASKS.filter(t => t.householdId === householdId) : [];
    const header = document.getElementById('tasks-header');
    if (header) header.textContent = `TASKS (${tasks.length})`;

    const container = document.getElementById('tasks-section');
    if (tasks.length === 0) {
      container.innerHTML = '<div class="text-xs" style="color:var(--text-muted);">No tasks</div>';
      return;
    }

    const statusColors = {
      'In Progress': { bg: 'var(--warning)', color: '#fff' },
      'Done': { bg: 'var(--success)', color: '#fff' },
      'To Do': { bg: 'var(--info)', color: '#fff' },
      'Not Started': { bg: 'var(--info)', color: '#fff' },
      'Waiting': { bg: 'var(--text-muted)', color: '#fff' },
      'Blocked': { bg: 'var(--error)', color: '#fff' }
    };

    container.innerHTML = tasks.slice(0, 4).map(task => {
      const sc = statusColors[task.status] || statusColors['To Do'];
      return `
        <div class="p-2 rounded transition-theme" style="background:var(--bg-surface-alt);">
          <div class="text-xs font-medium mb-1" style="color:var(--text-primary);">${task.title}</div>
          <div class="flex items-center gap-2">
            <span class="text-xs px-1.5 py-0.5 rounded" style="background:${sc.bg};color:${sc.color};">${task.status}</span>
            ${task.dueIn ? `<span class="text-xs" style="color:var(--text-muted);">${task.dueIn}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function renderHouseholdThreads(householdId, activeConvId) {
    const container = document.getElementById('threads-section');
    const allConvs = getConversationsByHousehold(householdId);

    const header = document.getElementById('threads-header');
    if (header) header.textContent = `HOUSEHOLD THREADS (${allConvs.length})`;

    container.innerHTML = allConvs.map(c => {
      const isActive = c.id === activeConvId;
      if (c.threadType === 'general') {
        return `
          <div class="flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer ${isActive ? '' : 'hover:opacity-80'}"
               style="${isActive ? 'background:var(--bg-active);' : ''}"
               onclick="${isActive ? '' : `selectConversation('${c.id}')`}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
            <span class="text-xs font-medium flex-1" style="color:${isActive ? 'var(--text-primary)' : 'var(--text-secondary)'};">General${isActive ? ' (current)' : ''}</span>
            ${c.unread > 0 ? `<span class="w-4 h-4 rounded-full flex items-center justify-center font-bold" style="font-size:9px;background:var(--gold);color:#000;">${c.unread}</span>` : ''}
          </div>`;
      } else {
        const trip = getTrip(c.tripId);
        const stage = trip ? getPipelineStage(trip.stage) : null;
        return `
          <div class="flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer ${isActive ? '' : 'hover:opacity-80'}"
               style="${isActive ? 'background:var(--bg-active);' : ''}"
               onclick="${isActive ? '' : `selectConversation('${c.id}')`}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
            <span class="text-xs font-medium flex-1 truncate" style="color:${isActive ? 'var(--text-primary)' : 'var(--text-secondary)'};">${trip ? trip.name : 'Trip'}${isActive ? ' (current)' : ''}</span>
            ${stage ? `<span class="inline-flex items-center px-1 py-0 rounded text-white font-semibold" style="font-size:8px;background:${stage.color};line-height:12px;">${stage.label}</span>` : ''}
            ${c.unread > 0 ? `<span class="w-4 h-4 rounded-full flex items-center justify-center font-bold" style="font-size:9px;background:var(--gold);color:#000;">${c.unread}</span>` : ''}
          </div>`;
      }
    }).join('');
  }

  // ---- Assignment dropdown ----
  function toggleAssignDropdown() {
    const dropdown = document.getElementById('assign-dropdown');
    const isHidden = dropdown.classList.contains('hidden');
    dropdown.classList.toggle('hidden');
    if (isHidden) renderAssignDropdown();
  }

  function renderAssignDropdown() {
    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;
    const list = document.getElementById('assign-agent-list');
    list.innerHTML = AGENTS.map(a => {
      const isPrimary = conv.assignedTo === a.id;
      const isCollab = (conv.collaborators || []).includes(a.id);
      const checkIcon = isPrimary
        ? `<span class="text-[10px] px-1.5 py-0.5 rounded-full font-semibold" style="background:var(--gold-bg);color:var(--gold);">Primary</span>`
        : isCollab
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
          : `<span class="w-3.5 h-3.5 rounded border" style="border-color:var(--border);"></span>`;
      return `
        <div class="flex items-center gap-2 px-3 py-1.5 cursor-pointer" style="color:var(--text-primary);"
             onmouseenter="this.style.background='var(--bg-active)'" onmouseleave="this.style.background=''"
             onclick="toggleAgentAssignment('${a.id}')">
          <span class="w-6 h-6 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0" style="font-size:9px;background:${a.color};">${a.initials}</span>
          <span class="text-sm flex-1">${a.name}</span>
          ${checkIcon}
        </div>`;
    }).join('');
  }

  function toggleAgentAssignment(agentId) {
    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;

    if (conv.assignedTo === agentId) {
      if (conv.collaborators && conv.collaborators.length > 0) {
        conv.assignedTo = conv.collaborators.shift();
      } else {
        conv.assignedTo = null;
      }
    } else if (conv.collaborators && conv.collaborators.includes(agentId)) {
      conv.collaborators = conv.collaborators.filter(id => id !== agentId);
    } else if (!conv.assignedTo) {
      conv.assignedTo = agentId;
    } else {
      if (!conv.collaborators) conv.collaborators = [];
      conv.collaborators.push(agentId);
    }

    renderMessages(); // updates header agent avatars
    renderAssignDropdown();
    renderQueue(true);
    renderContextPanel();
    showToast('Assignment updated', 'success');
  }

  function removeAllAssignments() {
    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;
    conv.assignedTo = null;
    conv.collaborators = [];
    renderMessages();
    renderAssignDropdown();
    renderQueue(true);
    renderContextPanel();
    document.getElementById('assign-dropdown').classList.add('hidden');
    showToast('All assignments removed', 'info');
  }

  function assignToMe() {
    const conv = CONVERSATIONS.find(c => c.id === selectedConvId);
    if (!conv) return;
    conv.assignedTo = 'a1';
    renderMessages();
    renderQueue(true);
    renderContextPanel();
    showToast('Assigned to you', 'success');
  }

  // Close dropdown on outside click
  document.addEventListener('click', (e) => {
    const wrapper = document.getElementById('agent-assign-wrapper');
    const dropdown = document.getElementById('assign-dropdown');
    if (wrapper && !wrapper.contains(e.target) && dropdown) {
      dropdown.classList.add('hidden');
    }
  });

  // ---- Collapsible sections ----
  function toggleSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (section.style.display === 'none') {
      section.style.display = '';
    } else {
      section.style.display = 'none';
    }
  }
</script>

</body>
</html>
