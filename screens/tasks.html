<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks -- Maestro Command Centre</title>
  <link href="https://framerusercontent.com/images/IpIhMdzyXKNL7tkqGF51UsTfpk.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/images/ps9lnUCtneok5DwSUeXm6INQAw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/ai-assistant.css">
  <script src="../js/data.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/interactions.js"></script>
  <script src="../js/ai-assistant.js"></script>
</head>
<body class="antialiased">

<div id="sidebar-root"></div>

<div id="main-wrapper" class="transition-all duration-200" style="margin-left:240px;">
  <div class="h-screen flex flex-col overflow-hidden" style="background:var(--bg-app);">

    <!-- Header -->
    <div class="px-6 py-4 border-b transition-theme" style="background:var(--bg-surface);border-color:var(--border);">
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-lg font-semibold" style="color:var(--text-primary);">Tasks</h1>
        <div class="flex items-center gap-2">
          <!-- Board/Table toggle -->
          <div class="flex items-center rounded-lg border overflow-hidden" style="border-color:var(--border);">
            <button id="view-board-btn" onclick="switchTaskView('board')"
              class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium transition-colors"
              style="background:var(--gold);color:#000;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="18"/></svg>
              Board
            </button>
            <button id="view-table-btn" onclick="switchTaskView('table')"
              class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium transition-colors"
              style="background:transparent;color:var(--text-muted);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
              Table
            </button>
          </div>
          <button class="btn-gold" onclick="openTaskModal()">+ Task</button>
        </div>
      </div>

      <!-- Stats bar -->
      <div class="flex items-center gap-3 mb-3" id="stats-bar"></div>

      <!-- Tabs -->
      <div class="flex items-center gap-4 mb-3">
        <button class="task-tab active text-sm font-semibold pb-1" style="border-bottom:2px solid var(--gold);color:var(--text-primary);" data-filter="all">All Tasks (<span id="all-count">0</span>)</button>
        <button class="task-tab text-sm font-medium pb-1" style="color:var(--text-muted);border-bottom:2px solid transparent;" data-filter="mine">My Tasks (<span id="mine-count">0</span>)</button>
        <button class="task-tab text-sm font-medium pb-1" style="color:var(--text-muted);border-bottom:2px solid transparent;" data-filter="urgent">Urgent (<span id="urgent-count">0</span>)</button>
      </div>

      <!-- Filters -->
      <div class="flex items-center gap-2 min-w-0">
        <select class="select" data-filter="status">
          <option value="all">Status</option>
          <option>Not Started</option>
          <option>In Progress</option>
          <option>Blocked</option>
          <option>Waiting</option>
          <option>Done</option>
        </select>
        <select class="select" data-filter="priority">
          <option value="all">Priority</option>
          <option>Urgent</option>
          <option>High</option>
          <option>Normal</option>
          <option>Low</option>
        </select>
        <select class="select" data-filter="source">
          <option value="all">Source</option>
          <option>Auto</option>
          <option>Manual</option>
        </select>
        <div class="ml-auto flex items-center gap-2 flex-shrink-0">
          <input class="input" placeholder="Search tasks..." style="width:180px;font-size:12px;padding:5px 10px;">
          <span class="text-xs whitespace-nowrap" style="color:var(--text-muted);">Sort: Priority</span>
        </div>
      </div>
    </div>

    <!-- Task container (board or table rendered here) -->
    <div id="task-container" class="flex-1 overflow-auto"></div>

  </div>
</div>

<!-- Task detail slide-over -->
<div id="task-detail-backdrop" class="slide-over-backdrop" onclick="closeSlideOver('task-detail')"></div>
<div id="task-detail" class="slide-over" style="width:520px;">
  <div class="flex items-center justify-between px-5 h-14 border-b" style="border-color:var(--border);">
    <span class="font-semibold text-sm" style="color:var(--text-primary);">Task Detail</span>
    <button onclick="closeSlideOver('task-detail')" style="color:var(--text-muted);cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div class="p-5 space-y-4" id="task-detail-content">
    <!-- Populated on click -->
  </div>
</div>

<script>
  let currentView = 'board';
  let currentFilter = null;

  const TASK_STATUSES = [
    { id: 'Not Started', label: 'Not Started', color: '#94a3b8' },
    { id: 'In Progress', label: 'In Progress', color: '#2563eb' },
    { id: 'Blocked',     label: 'Blocked',     color: '#e11d48' },
    { id: 'Waiting',     label: 'Waiting',     color: '#d97706' },
    { id: 'Done',        label: 'Done',        color: '#059669' },
  ];

  const statusStyles = {
    'In Progress': { bg: 'var(--info-bg)', color: 'var(--info)' },
    'Blocked':     { bg: 'var(--error-bg)', color: 'var(--error)' },
    'Not Started': { bg: 'var(--bg-surface-alt)', color: 'var(--text-muted)' },
    'Waiting':     { bg: 'var(--warning-bg)', color: 'var(--warning)' },
    'Done':        { bg: 'var(--success-bg)', color: 'var(--success)' },
  };
  const priorityStyles = {
    'Urgent': { bg: 'var(--error-bg)', color: 'var(--error)' },
    'High':   { bg: 'var(--warning-bg)', color: 'var(--warning)' },
    'Normal': { bg: 'var(--bg-surface-alt)', color: 'var(--text-secondary)' },
    'Low':    { bg: 'var(--bg-surface-alt)', color: 'var(--text-muted)' },
  };

  document.addEventListener('DOMContentLoaded', () => {
    MaestroNav.render('sidebar-root');
    document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    renderStats();
    renderTaskBoard(null);
    initTaskTabs();

    const observer = new MutationObserver(() => {
      document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    });
    setTimeout(() => {
      const sb = document.getElementById('sidebar');
      if (sb) observer.observe(sb, { attributes: true, attributeFilter: ['class'] });
    }, 100);
  });

  function getFilteredTasks(filter) {
    let tasks = TASKS.slice();
    if (filter === 'mine') tasks = tasks.filter(t => t.assignedTo === 'a1');
    if (filter === 'urgent') tasks = tasks.filter(t => t.priority === 'Urgent');
    const priorityOrder = { Urgent: 0, High: 1, Normal: 2, Low: 3 };
    tasks.sort((a, b) => (priorityOrder[a.priority] ?? 9) - (priorityOrder[b.priority] ?? 9));
    return tasks;
  }

  function renderStats() {
    const s = getTaskStats();
    document.getElementById('all-count').textContent = TASKS.length;
    document.getElementById('mine-count').textContent = s.myTasks;
    document.getElementById('urgent-count').textContent = s.urgent;

    document.getElementById('stats-bar').innerHTML = `
      <div class="text-sm" style="color:var(--text-secondary);">
        <span class="font-semibold" style="color:var(--text-primary);">${s.open}</span> open
        <span class="mx-2" style="color:var(--border);">|</span>
        <span class="font-semibold" style="color:var(--error);">${s.urgent}</span> urgent
        <span class="mx-2" style="color:var(--border);">|</span>
        <span class="font-semibold" style="color:var(--warning);">${s.blocked}</span> blocked
        <span class="mx-2" style="color:var(--border);">|</span>
        <span class="font-semibold" style="color:var(--success);">0</span> done today
      </div>
    `;
  }

  function renderTaskBoard(filter) {
    const tasks = getFilteredTasks(filter);
    const container = document.getElementById('task-container');

    container.innerHTML = `
      <div class="flex gap-4 p-6 h-full" style="min-width:max-content;">
        ${TASK_STATUSES.map(status => {
          const colTasks = tasks.filter(t => t.status === status.id);
          return `
            <div class="kanban-col flex flex-col gap-3">
              <!-- Column header -->
              <div class="flex items-center gap-2 mb-1">
                <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${status.color};"></div>
                <span class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-muted);">${status.label}</span>
                <span class="ml-auto text-xs font-semibold px-1.5 py-0.5 rounded-full" style="background:var(--bg-surface-alt);color:var(--text-muted);">${colTasks.length}</span>
              </div>
              <!-- Cards -->
              ${colTasks.map(t => renderTaskCard(t)).join('')}
              ${colTasks.length === 0 ? `<div class="text-xs text-center py-6" style="color:var(--text-muted);border:1px dashed var(--border);border-radius:var(--radius);">No tasks</div>` : ''}
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderTaskCard(t) {
    const household = getHousehold(t.householdId);
    const agent = getAgent(t.assignedTo);
    const isOverdue = t.dueIn && t.dueIn.includes('overdue');

    let borderLeft = 'border-left: 3px solid transparent';
    if (t.priority === 'Urgent') borderLeft = 'border-left: 3px solid var(--error)';
    else if (t.priority === 'High') borderLeft = 'border-left: 3px solid var(--warning)';

    return `
      <div class="kanban-card" style="${borderLeft}" onclick="showTaskDetail('${t.id}')">
        <div class="text-sm font-medium mb-1.5 leading-snug" style="color:var(--text-primary);">${t.title}</div>
        <div class="text-xs mb-2.5" style="color:var(--text-muted);">${household?.name || ''} · <span class="${isOverdue ? '' : ''}" style="color:${isOverdue ? 'var(--error)' : 'var(--text-muted)'};">${t.dueIn}</span></div>
        <div class="flex items-center justify-between">
          <span class="avatar avatar-sm" style="background:${agent?.color || '#94a3b8'};color:#fff;font-size:9px;" title="${agent?.name || ''}">${agent?.initials || '?'}</span>
          ${t.priority === 'Urgent' || t.priority === 'High' ? `<span class="badge" style="background:${priorityStyles[t.priority].bg};color:${priorityStyles[t.priority].color};font-size:10px;">${t.priority}</span>` : ''}
        </div>
      </div>`;
  }

  function renderTaskTable(filter) {
    const tasks = getFilteredTasks(filter);
    const container = document.getElementById('task-container');

    container.innerHTML = `
      <div class="px-6 overflow-y-auto h-full">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40%;">Task</th>
              <th>Client</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Assigned</th>
              <th>Due</th>
            </tr>
          </thead>
          <tbody>
            ${tasks.map(t => {
              const household = getHousehold(t.householdId);
              const agent = getAgent(t.assignedTo);
              const ss = statusStyles[t.status] || statusStyles['Not Started'];
              const ps = priorityStyles[t.priority] || priorityStyles['Normal'];
              const isOverdue = t.dueIn && t.dueIn.includes('overdue');
              let borderStyle = 'border-left: 3px solid transparent';
              if (t.priority === 'Urgent') borderStyle = 'border-left: 3px solid var(--error)';
              else if (t.priority === 'High') borderStyle = 'border-left: 3px solid var(--warning)';
              return `
                <tr style="cursor:pointer;${borderStyle}" onclick="showTaskDetail('${t.id}')">
                  <td>
                    <div class="font-medium" style="color:var(--text-primary);">${t.title}</div>
                    <div class="text-xs mt-0.5" style="color:var(--text-muted);">${t.venue || ''}</div>
                  </td>
                  <td>
                    <div class="flex items-center gap-2">
                      <span class="avatar avatar-sm avatar-silhouette">${clientAvatarSVG()}</span>
                      <span class="text-xs">${household?.name || ''}</span>
                    </div>
                  </td>
                  <td><span class="badge" style="background:${ss.bg};color:${ss.color};">${t.status}</span></td>
                  <td><span class="badge" style="background:${ps.bg};color:${ps.color};">${t.priority}</span></td>
                  <td>
                    <div class="flex items-center gap-1.5">
                      <span class="avatar avatar-sm" style="background:${agent?.color || '#94a3b8'};color:#fff;font-size:9px;">${agent?.initials || '?'}</span>
                      <span class="text-xs">${agent?.name?.split(' ')[0] || ''}</span>
                    </div>
                  </td>
                  <td><span class="text-xs font-medium" style="color:${isOverdue ? 'var(--error)' : 'var(--text-secondary)'};">${t.dueIn}</span></td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function switchTaskView(view) {
    currentView = view;
    const boardBtn = document.getElementById('view-board-btn');
    const tableBtn = document.getElementById('view-table-btn');
    if (view === 'board') {
      boardBtn.style.background = 'var(--gold)';
      boardBtn.style.color = '#000';
      tableBtn.style.background = 'transparent';
      tableBtn.style.color = 'var(--text-muted)';
      renderTaskBoard(currentFilter);
    } else {
      tableBtn.style.background = 'var(--gold)';
      tableBtn.style.color = '#000';
      boardBtn.style.background = 'transparent';
      boardBtn.style.color = 'var(--text-muted)';
      renderTaskTable(currentFilter);
    }
  }

  function initTaskTabs() {
    document.querySelectorAll('.task-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.task-tab').forEach(t => {
          t.classList.remove('active');
          t.style.borderBottomColor = 'transparent';
          t.style.color = 'var(--text-muted)';
        });
        tab.classList.add('active');
        tab.style.borderBottomColor = 'var(--gold)';
        tab.style.color = 'var(--text-primary)';
        currentFilter = tab.dataset.filter === 'all' ? null : tab.dataset.filter;
        if (currentView === 'board') renderTaskBoard(currentFilter);
        else renderTaskTable(currentFilter);
      });
    });
  }

  function showTaskDetail(taskId) {
    const t = TASKS.find(tk => tk.id === taskId);
    if (!t) return;
    const household = getHousehold(t.householdId);
    const primaryClient = getClient(household.primaryClientId);
    const agent = getAgent(t.assignedTo);
    const trip = getTrip(t.tripId);

    const ss = statusStyles[t.status] || statusStyles['Not Started'];
    const ps = priorityStyles[t.priority] || priorityStyles['Normal'];

    document.getElementById('task-detail-content').innerHTML = `
      <div>
        <h3 class="text-base font-semibold mb-1" style="color:var(--text-primary);">${t.title}</h3>
        <div class="text-xs" style="color:var(--text-muted);">${t.venue || ''}</div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Status</div>
          <span class="badge" style="background:${ss.bg};color:${ss.color};">${t.status}</span>
        </div>
        <div>
          <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Priority</div>
          <span class="badge" style="background:${ps.bg};color:${ps.color};">${t.priority}</span>
        </div>
        <div>
          <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Due</div>
          <span class="text-sm font-medium" style="color:var(--text-primary);">${t.dueIn}</span>
        </div>
        <div>
          <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Source</div>
          <span class="badge" style="background:${t.source === 'auto' ? 'var(--info-bg)' : 'var(--bg-surface-alt)'};color:${t.source === 'auto' ? 'var(--info)' : 'var(--text-muted)'};">${t.source}</span>
        </div>
      </div>

      <div>
        <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Client</div>
        <div class="flex items-center gap-2">
          <span class="avatar avatar-sm avatar-silhouette">${clientAvatarSVG()}</span>
          <a href="client-detail?id=${primaryClient?.id}" class="text-sm font-medium hover:underline" style="color:var(--text-primary);">${household?.name}</a>
        </div>
      </div>

      <div>
        <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Trip</div>
        <a href="trip-detail?id=${t.tripId}" class="text-sm font-medium hover:underline" style="color:var(--gold);">${trip?.name || 'N/A'}</a>
      </div>

      <div>
        <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Assigned To</div>
        <div class="flex items-center gap-2">
          <span class="avatar avatar-sm" style="background:${agent?.color};color:#fff;">${agent?.initials}</span>
          <span class="text-sm" style="color:var(--text-primary);">${agent?.name}</span>
        </div>
      </div>

      <div id="task-ai-briefing-${t.id}"></div>

      <div>
        <div class="text-xs font-semibold mb-2" style="color:var(--text-muted);">Change Status</div>
        <select class="select" style="width:100%;" onchange="showToast('Status updated to ' + this.value, 'success')">
          <option ${t.status === 'Not Started' ? 'selected' : ''}>Not Started</option>
          <option ${t.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
          <option ${t.status === 'Blocked' ? 'selected' : ''}>Blocked</option>
          <option ${t.status === 'Waiting' ? 'selected' : ''}>Waiting</option>
          <option ${t.status === 'Done' ? 'selected' : ''}>Done</option>
        </select>
      </div>

      <div>
        <div class="text-xs font-semibold mb-1" style="color:var(--text-muted);">Activity</div>
        <div class="space-y-2 mt-2">
          <div class="flex gap-2 text-xs">
            <div class="w-1.5 h-1.5 rounded-full mt-1.5" style="background:var(--info);"></div>
            <div><span style="color:var(--text-secondary);">Task created from client message</span> <span style="color:var(--text-muted);">- 2 days ago</span></div>
          </div>
          <div class="flex gap-2 text-xs">
            <div class="w-1.5 h-1.5 rounded-full mt-1.5" style="background:var(--warning);"></div>
            <div><span style="color:var(--text-secondary);">Assigned to ${agent?.name}</span> <span style="color:var(--text-muted);">- 2 days ago</span></div>
          </div>
          <div class="flex gap-2 text-xs">
            <div class="w-1.5 h-1.5 rounded-full mt-1.5" style="background:var(--success);"></div>
            <div><span style="color:var(--text-secondary);">Status changed to ${t.status}</span> <span style="color:var(--text-muted);">- 1 day ago</span></div>
          </div>
          <div class="flex gap-2 text-xs">
            <div class="w-1.5 h-1.5 rounded-full mt-1.5" style="background:var(--text-muted);"></div>
            <div><span style="color:var(--text-secondary);">Due date set to ${t.dueIn}</span> <span style="color:var(--text-muted);">- 3 days ago</span></div>
          </div>
        </div>
      </div>

      <div class="flex gap-2 pt-2 border-t" style="border-color:var(--border);">
        <button class="btn-gold flex-1" onclick="showToast('Task marked complete','success');closeSlideOver('task-detail');">Mark Complete</button>
        <button class="btn-ghost flex-1" onclick="openReassignModal()">Reassign</button>
      </div>
    `;
    openSlideOver('task-detail');

    const briefing = typeof AI_BRIEFINGS !== 'undefined' && AI_BRIEFINGS[taskId];
    if (briefing) {
      const briefingContainer = document.getElementById('task-ai-briefing-' + taskId);
      if (briefingContainer) {
        MaestroAI.renderBriefingCard(briefingContainer, briefing);
      }
    }
  }
</script>

</body>
</html>
