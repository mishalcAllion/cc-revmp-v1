<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Pipeline -- Maestro Command Centre</title>
  <link href="https://framerusercontent.com/images/IpIhMdzyXKNL7tkqGF51UsTfpk.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/images/ps9lnUCtneok5DwSUeXm6INQAw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/ai-assistant.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/data.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/interactions.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/ai-assistant.js"></script>
  <script src="../js/responsive.js"></script>
</head>
<body class="antialiased">

<div id="sidebar-root"></div>

<div id="main-wrapper" class="transition-all duration-200" style="margin-left:240px;">
  <div class="h-screen flex flex-col overflow-hidden" style="background:var(--bg-app);">

    <!-- Header -->
    <div class="px-6 py-4 border-b transition-theme" style="background:var(--bg-surface);border-color:var(--border);">
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-lg font-semibold" style="color:var(--text-primary);">Trip Pipeline</h1>
        <div class="flex items-center gap-2">
          <!-- View toggle -->
          <div class="flex items-center border rounded-md overflow-hidden" style="border-color:var(--border);">
            <button id="btn-kanban" class="px-2 py-1 text-xs font-medium" style="background:var(--bg-active);color:var(--text-primary);" onclick="switchView('kanban')">Kanban</button>
            <button id="btn-table" class="px-2 py-1 text-xs font-medium" style="color:var(--text-muted);" onclick="switchView('table')">Table</button>
          </div>
          <button class="btn-gold" style="padding:6px 12px;font-size:12px;" onclick="openTripModal()">+ Trip</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex items-center gap-2">
        <select class="select">
          <option>All Agents</option>
          <option>My Trips</option>
          <option>Angua von Uberwald</option>
          <option>Carrot Ironfoundersson</option>
          <option>Magrat Garlick</option>
        </select>
        <select class="select">
          <option>All Dates</option>
          <option>This Month</option>
          <option>Next Month</option>
          <option>Q2 2026</option>
        </select>
        <input class="input" placeholder="Search trips..." style="width:200px;font-size:12px;padding:5px 10px;">
        <div class="ml-auto flex items-center gap-3">
          <span class="stat-pill"><span id="trip-count" style="font-weight:700;color:var(--text-primary);">--</span> total trips</span>
        </div>
      </div>
    </div>

    <!-- Kanban board -->
    <div class="flex-1 overflow-x-auto overflow-y-hidden px-4 py-4">
      <div class="flex gap-4 h-full" id="kanban-board">
        <!-- Columns rendered by JS -->
      </div>
    </div>

  </div>
</div>

<script>
  let currentView = 'kanban';

  function switchView(view) {
    currentView = view;
    const btnKanban = document.getElementById('btn-kanban');
    const btnTable = document.getElementById('btn-table');
    const board = document.getElementById('kanban-board');
    if (view === 'kanban') {
      btnKanban.style.background = 'var(--bg-active)';
      btnKanban.style.color = 'var(--text-primary)';
      btnTable.style.background = 'transparent';
      btnTable.style.color = 'var(--text-muted)';
      board.style.minWidth = '';
      renderKanban();
    } else {
      btnTable.style.background = 'var(--bg-active)';
      btnTable.style.color = 'var(--text-primary)';
      btnKanban.style.background = 'transparent';
      btnKanban.style.color = 'var(--text-muted)';
      board.style.minWidth = '';
      renderTable();
    }
  }

  function renderTable() {
    const board = document.getElementById('kanban-board');
    board.innerHTML = `
      <table class="w-full text-left text-sm" style="color:var(--text-primary);">
        <thead>
          <tr class="text-xs uppercase" style="color:var(--text-muted);border-bottom:1px solid var(--border);">
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Trip</th>
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Client</th>
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Dates</th>
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Stage</th>
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Agent</th>
            <th class="py-2 px-3 font-semibold text-center" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Travelers</th>
            <th class="py-2 px-3 font-semibold text-center" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);" title="Stored as 'Components' in the database">Bookings</th>
            <th class="py-2 px-3 font-semibold" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">Budget</th>
          </tr>
        </thead>
        <tbody>
          ${TRIPS.map(trip => {
            const household = getHousehold(trip.householdId);
            const primaryClient = getClient(household.primaryClientId);
            const agent = getAgent(trip.agentId);
            const stage = getPipelineStage(trip.stage);
            const travelerCount = trip.travelers.length + (trip.guests?.length || 0);
            return `
              <tr class="cursor-pointer transition-theme" style="border-bottom:1px solid var(--border);" onmouseover="this.style.background='var(--bg-surface-alt)'" onmouseout="this.style.background=''" onclick="window.location.href='trip-detail?id=${trip.id}'">
                <td class="py-2.5 px-3 font-medium">${trip.name}</td>
                <td class="py-2.5 px-3">
                  <div class="flex items-center gap-2">
                    <span class="avatar avatar-sm avatar-silhouette">${clientAvatarSVG()}</span>
                    ${household.name}
                  </div>
                </td>
                <td class="py-2.5 px-3 text-xs" style="color:var(--text-muted);">${trip.dates}</td>
                <td class="py-2.5 px-3"><span class="inline-flex items-center px-1.5 py-0.5 rounded text-white font-semibold" style="font-size:10px;background:${stage.color};">${stage.label}</span></td>
                <td class="py-2.5 px-3"><span class="avatar avatar-sm" style="background:${agent?.color || '#94a3b8'};color:#fff;font-size:9px;" title="${agent?.name}">${agent?.initials || '?'}</span></td>
                <td class="py-2.5 px-3 text-center">${travelerCount}</td>
                <td class="py-2.5 px-3 text-center">${getComponentsByTrip(trip.id).length}</td>
                <td class="py-2.5 px-3">${trip.budget || '--'}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    MaestroNav.render('sidebar-root');
    document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    document.getElementById('trip-count').textContent = TRIPS.length;
    renderKanban();

    const observer = new MutationObserver(() => {
      document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    });
    setTimeout(() => {
      const sb = document.getElementById('sidebar');
      if (sb) observer.observe(sb, { attributes: true, attributeFilter: ['class'] });
    }, 100);
  });

  const STAGE_DESCRIPTIONS = {
    lead:      'Initial inquiry received — client has shown interest but no planning started',
    discovery: 'Gathering client preferences, dates, and trip requirements',
    planning:  'Building the itinerary and researching options',
    proposal:  'Proposal sent to client — awaiting feedback or approval',
    booking:   'Client approved — confirming reservations with suppliers',
    active:    'Trip is underway — client is currently travelling',
    archived:  'Trip completed or cancelled',
  };

  function renderKanban() {
    const board = document.getElementById('kanban-board');

    board.innerHTML = PIPELINE_STAGES.map(stage => {
      const trips = getTripsByStage(stage.id);
      return `
        <div class="kanban-col flex flex-col">
          <!-- Column header -->
          <div class="flex items-center justify-between mb-3 px-1">
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full" style="background:${stage.color};"></div>
              <span class="text-xs font-semibold uppercase tracking-wide" style="color:var(--text-secondary);" data-tooltip="${STAGE_DESCRIPTIONS[stage.id] || ''}" data-tooltip-dir="below">${stage.label}</span>
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold" style="background:var(--bg-surface-alt);color:var(--text-muted);">${trips.length}</span>
            </div>
          </div>

          <!-- Column body -->
          <div class="flex-1 overflow-y-auto space-y-2 rounded-lg p-2" style="background:var(--bg-surface-alt);">
            ${trips.length === 0 ? `
              <div class="text-center py-8 text-xs" style="color:var(--text-muted);">
                No trips in ${stage.label.toLowerCase()}
              </div>
            ` : trips.map(trip => {
              const household = getHousehold(trip.householdId);
              const primaryClient = getClient(household.primaryClientId);
              const agent = getAgent(trip.agentId);
              const stats = getComponentStats(trip.id);
              const travelerCount = trip.travelers.length + (trip.guests?.length || 0);

              return `
                <div class="kanban-card" style="padding:10px;" data-tooltip="${trip.budget ? 'Budget: ' + trip.budget : ''}" onclick="window.location.href='trip-detail?id=${trip.id}'">
                  <div class="flex items-center justify-between mb-1.5">
                    <div class="flex items-center gap-1.5">
                      <span class="avatar avatar-sm avatar-silhouette">${clientAvatarSVG()}</span>
                      <span class="text-xs font-semibold" style="color:var(--text-primary);">${household.name}</span>
                    </div>
                    ${stats.needsAttention > 0 ? `<span class="badge" style="background:var(--warning-bg);color:var(--warning);font-size:9px;" title="${stats.needsAttention} booking(s) need your action — pending approval or supplier confirmation required">${stats.needsAttention} need action</span>` : ''}
                  </div>
                  <div class="text-sm font-medium mb-1" style="color:var(--text-primary);">${trip.name}</div>
                  <div class="text-xs mb-2" style="color:var(--text-muted);">${trip.dates}</div>
                  <div class="flex items-center justify-between">
                    <div class="text-xs" style="color:var(--text-muted);" title="Stored as 'Components' in the database">
                      ${travelerCount} travelers &#183; ${stats.total} bookings
                    </div>
                    ${stats.unreviewed > 0 ? `<span class="w-2 h-2 rounded-full" style="background:var(--error);" title="${stats.unreviewed} unreviewed comments"></span>` : ''}
                    <span class="avatar avatar-sm" style="background:${agent?.color || '#94a3b8'};color:#fff;font-size:9px;" title="${agent?.name}">${agent?.initials || '?'}</span>
                  </div>
                  ${trip.budget ? `<div class="text-xs mt-1.5" style="color:var(--gold);font-weight:600;">Budget: ${trip.budget}</div>` : ''}
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('');

    // Re-activate mobile kanban after dynamic re-render
    if (window.matchMedia('(max-width: 767px)').matches && window.MobileResponsive?.MobileKanban) {
      setTimeout(() => window.MobileResponsive.MobileKanban._activate(), 0);
    }
  }
</script>

</body>
</html>
