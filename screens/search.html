<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search -- Maestro Command Centre</title>
  <link href="https://framerusercontent.com/images/IpIhMdzyXKNL7tkqGF51UsTfpk.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/images/ps9lnUCtneok5DwSUeXm6INQAw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/ai-assistant.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/data.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/interactions.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/ai-assistant.js"></script>
  <script src="../js/responsive.js"></script>

  <style>
    .search-category-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .search-category-chip:hover {
      border-color: var(--gold);
      color: var(--text-primary);
    }
    .search-category-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .search-big-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px 14px 48px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-big-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
    }
    .search-big-input::placeholder {
      color: var(--text-muted);
    }

    .search-input-wrap {
      position: relative;
    }
    .search-input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg-hover);
      border: none;
      border-radius: 9999px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .search-clear-btn:hover { background: var(--border); color: var(--text-primary); }

    .search-section-heading {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 16px 0 6px;
    }

    .search-result-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }
    .search-result-card:last-child { border-bottom: none; }
    .search-result-card:hover { background: var(--bg-hover); }

    .search-result-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .search-result-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }

    .search-result-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-sub {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .search-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      background: var(--bg-app);
      color: var(--text-muted);
    }

    .search-result-arrow {
      color: var(--text-muted);
      flex-shrink: 0;
      opacity: 0.5;
    }

    .search-highlight {
      background: rgba(212,175,55,0.25);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .search-empty-state {
      text-align: center;
      padding: 56px 24px 40px;
    }
    .search-empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--text-muted);
    }
    .search-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .search-empty-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .search-suggestion-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .search-suggestion-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .search-suggestion-pill:hover {
      border-color: var(--gold);
      color: var(--text-primary);
      background: rgba(212,175,55,0.06);
    }
    .search-kb-hint {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .search-kb-key {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      background: var(--bg-app);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .search-no-results {
      text-align: center;
      padding: 48px 24px;
    }

    .search-results-section {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-surface);
      margin-bottom: 12px;
    }
    .search-results-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-app);
    }
    .search-results-section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .search-results-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 639px) {
      .search-big-input { font-size: 15px; padding: 12px 16px 12px 44px; }
      .search-result-card { padding: 10px 12px; }
      .search-result-title { font-size: 13px; }
    }
  </style>
</head>
<body class="antialiased">

<!-- Sidebar -->
<div id="sidebar-root"></div>

<!-- Command palette mount -->
<div id="cmd-palette-root"></div>

<!-- Main content -->
<div id="main-wrapper" class="transition-all duration-200" style="margin-left:240px;">
  <div class="flex flex-col h-screen overflow-hidden transition-theme" style="background:var(--bg-app);">

    <!-- Header -->
    <div class="px-4 sm:px-6 py-4 border-b transition-theme flex-shrink-0" style="background:var(--bg-surface);border-color:var(--border);">
      <div class="flex items-center gap-3">
        <!-- Mobile hamburger -->
        <button id="hamburger-btn" class="lg:hidden flex-shrink-0 p-2 rounded-lg transition-colors" style="color:var(--text-muted);" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="text-lg sm:text-xl font-semibold" style="color:var(--text-primary);">Search</h1>
          <p class="text-sm mt-0.5" style="color:var(--text-muted);" id="results-subtitle">Search across all clients, trips, tasks, and more</p>
        </div>
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 py-5">

        <!-- Search input -->
        <div class="search-input-wrap mb-4">
          <span class="search-input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </span>
          <input
            id="search-main-input"
            type="text"
            class="search-big-input"
            placeholder="Search clients, trips, tasks, conversations..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="search-clear-btn" class="search-clear-btn" style="display:none;" title="Clear search">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- Category chips + clear -->
        <div class="flex flex-wrap items-center gap-2 mb-5" id="category-chips">
          <button class="search-category-chip active" data-type="all" onclick="setTypeFilter('all', this)">All</button>
          <button class="search-category-chip" data-type="clients" onclick="setTypeFilter('clients', this)">Clients</button>
          <button class="search-category-chip" data-type="trips" onclick="setTypeFilter('trips', this)">Trips</button>
          <button class="search-category-chip" data-type="tasks" onclick="setTypeFilter('tasks', this)">Tasks</button>
          <button class="search-category-chip" data-type="conversations" onclick="setTypeFilter('conversations', this)">Conversations</button>
          <button class="search-category-chip" data-type="alerts" onclick="setTypeFilter('alerts', this)">Alerts</button>
          <button class="search-category-chip" data-type="ai-threads" onclick="setTypeFilter('ai-threads', this)">AI Threads</button>
          <button id="chip-clear-btn" onclick="setQuery('')" style="display:none;margin-left:auto;padding:4px 10px;border-radius:9999px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:none;align-items:center;gap:5px;transition:border-color 0.15s,color 0.15s;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--text-primary)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            Clear
          </button>
        </div>

        <!-- Results area -->
        <div id="search-results-area"></div>

      </div>
    </div>

  </div>
</div>

<script>
  let currentQuery = '';
  let currentTypeFilter = 'all';
  let debounceTimer = null;

  const SUGGESTIONS = [
    'Vimes', 'Paris', 'Athens', 'Santorini', 'Maldives',
    'VIP', 'Urgent', 'Blocked', 'Delta', 'Japan'
  ];

  function setTypeFilter(type, btn) {
    currentTypeFilter = type;
    document.querySelectorAll('.search-category-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderResults();
  }

  function renderEmptyState() {
    const pills = SUGGESTIONS.map(s =>
      `<button class="search-suggestion-pill" onclick="setQuery('${s}')">${s}</button>`
    ).join('');

    return `
      <div class="search-empty-state">
        <div class="search-empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div class="search-empty-title">Search everything</div>
        <div class="search-empty-sub">Find clients, trips, tasks, conversations, alerts, and AI threads</div>
        <div class="search-suggestion-pills">${pills}</div>
        <div class="search-kb-hint">
          <span>Type to search</span>
          <span>·</span>
          <span class="search-kb-key">Esc</span>
          <span>to clear</span>
          <span>·</span>
          <span class="search-kb-key">Ctrl+K</span>
          <span>quick search</span>
        </div>
      </div>`;
  }

  function renderNoResults(query) {
    const safe = query.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return `
      <div class="search-no-results">
        <div class="search-empty-icon" style="margin:0 auto 14px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div class="search-empty-title">No results for &ldquo;${safe}&rdquo;</div>
        <div class="search-empty-sub" style="margin-top:6px;">Try a different term, or broaden the category filter above</div>
        <button onclick="setQuery('')" class="search-suggestion-pill" style="margin-top:16px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px;"><path d="M18 6 6 18M6 6l12 12"/></svg>
          Clear search
        </button>
      </div>`;
  }

  function groupByType(results) {
    const groups = {};
    for (const r of results) {
      if (!groups[r.type]) groups[r.type] = [];
      groups[r.type].push(r);
    }
    return groups;
  }

  function renderResults() {
    const area = document.getElementById('search-results-area');
    const subtitle = document.getElementById('results-subtitle');

    if (!currentQuery.trim()) {
      area.innerHTML = renderEmptyState();
      subtitle.textContent = 'Search across all clients, trips, tasks, and more';
      return;
    }

    let results = [];
    try {
      results = MaestroSearch.search(currentQuery, currentTypeFilter);
    } catch(e) {
      area.innerHTML = renderNoResults(currentQuery);
      subtitle.textContent = 'No results found';
      return;
    }

    if (results.length === 0) {
      area.innerHTML = renderNoResults(currentQuery);
      subtitle.textContent = 'No results found';
      return;
    }

    const groups = groupByType(results);
    const typeOrder = ['clients', 'trips', 'tasks', 'conversations', 'alerts', 'ai-threads'];
    const totalCount = results.length;
    subtitle.textContent = `${totalCount} result${totalCount !== 1 ? 's' : ''}`;

    let html = '';

    for (const type of typeOrder) {
      if (!groups[type]) continue;
      const typeConfig = MaestroSearch.ENTITY_TYPES.find(e => e.key === type);
      const color = MaestroSearch.colorForType(type);
      const icon = MaestroSearch.iconForType(type);
      const count = groups[type].length;

      const cardsHtml = groups[type].map(r => MaestroSearch.renderFullResult(r, currentQuery)).join('');

      html += `
        <div class="search-results-section">
          <div class="search-results-section-header">
            <span class="search-results-section-title">
              <span style="color:${color};">${icon}</span>
              <span>${typeConfig ? typeConfig.label : type}</span>
            </span>
            <span class="search-results-count">${count} result${count !== 1 ? 's' : ''}</span>
          </div>
          ${cardsHtml}
        </div>`;
    }

    area.innerHTML = html;
  }

  function setClearVisible(q) {
    document.getElementById('search-clear-btn').style.display = q ? 'flex' : 'none';
    const chipClear = document.getElementById('chip-clear-btn');
    if (chipClear) chipClear.style.display = q ? 'inline-flex' : 'none';
  }

  function setQuery(q) {
    const input = document.getElementById('search-main-input');
    input.value = q;
    currentQuery = q;
    setClearVisible(q);
    renderResults();
    input.focus();
    updateUrl(q);
  }

  function updateUrl(q) {
    const params = new URLSearchParams(window.location.search);
    if (q) { params.set('q', q); } else { params.delete('q'); }
    history.replaceState(null, '', '?' + params.toString());
  }

  document.addEventListener('DOMContentLoaded', () => {
    MaestroNav.render('sidebar-root');
    updateMainMargin();
    document.getElementById('cmd-palette-root').innerHTML = renderCommandPalette();

    const input = document.getElementById('search-main-input');
    const clearBtn = document.getElementById('search-clear-btn');

    // Read URL param
    const params = new URLSearchParams(window.location.search);
    const urlQuery = params.get('q') || '';
    if (urlQuery) {
      input.value = urlQuery;
      currentQuery = urlQuery;
      clearBtn.style.display = 'flex';
    }

    renderResults();
    input.focus();

    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      currentQuery = input.value;
      setClearVisible(currentQuery);
      debounceTimer = setTimeout(() => {
        renderResults();
        updateUrl(currentQuery);
      }, 120);
    });

    clearBtn.addEventListener('click', () => {
      setQuery('');
      input.focus();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (currentQuery) {
          setQuery('');
        }
        e.stopPropagation();
      }
    });
  });
</script>
</body>
</html>
