<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Alerts -- Maestro Command Centre</title>
  <link href="https://framerusercontent.com/images/IpIhMdzyXKNL7tkqGF51UsTfpk.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/images/ps9lnUCtneok5DwSUeXm6INQAw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/ai-assistant.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/data.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/interactions.js"></script>
  <script src="../js/ai-assistant.js"></script>
  <script src="../js/responsive.js"></script>
</head>
<body class="antialiased">

<div id="sidebar-root"></div>

<div id="main-wrapper" class="transition-all duration-200" style="margin-left:240px;">
  <div class="h-screen flex flex-col overflow-hidden" style="background:var(--bg-app);">

    <!-- Header -->
    <div class="px-6 py-4 border-b transition-theme" style="background:var(--bg-surface);border-color:var(--border);">
      <div class="flex items-center justify-between mb-1">
        <div>
          <h1 class="text-lg font-semibold" style="color:var(--text-primary);">Flight Alerts</h1>
          <p class="text-xs mt-0.5" style="color:var(--text-muted);">Monitor award seat availability — get notified when points bookings open up</p>
        </div>
        <button class="btn-gold" onclick="openAlertModal()">+ New Alert</button>
      </div>

      <!-- Stats -->
      <div class="flex flex-wrap items-center gap-3 mb-3 mt-3">
        <div class="text-sm" style="color:var(--text-secondary);">
          <span class="font-semibold" id="stat-active" style="color:var(--text-primary);">–</span>
          <span data-tooltip="Actively monitoring for matching award seat availability"> active</span>
          <span class="mx-2" style="color:var(--border);">|</span>
          <span class="font-semibold" id="stat-triggered" style="color:var(--success);">–</span>
          <span data-tooltip="A matching flight was found — check the AI insight below the row"> availability found</span>
          <span class="mx-2" style="color:var(--border);">|</span>
          <span class="font-semibold" id="stat-paused" style="color:var(--text-primary);">–</span> paused
        </div>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap items-center gap-2">
        <select class="select">
          <option>All Statuses</option>
          <option>Active</option>
          <option>Availability Found</option>
          <option>Paused</option>
          <option>Expired</option>
        </select>
        <select id="client-filter" class="select">
          <option>All Clients</option>
        </select>
        <input class="input" placeholder="Search by route, client or program..." style="width:260px;font-size:12px;padding:5px 10px;">
      </div>
    </div>

    <!-- Alerts table -->
    <div class="flex-1 overflow-y-auto px-6">
      <div class="table-responsive-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Route</th>
              <th>Dates</th>
              <th data-tooltip="F = First, J = Business, Y = Economy">Cabin</th>
              <th data-tooltip="Maximum points you're willing to spend on this booking">Points Budget</th>
              <th>Program</th>
              <th>Client</th>
              <th>Status</th>
              <th data-tooltip="Number of times a matching award seat was found">Times Found</th>
            </tr>
          </thead>
          <tbody id="alerts-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    MaestroNav.render('sidebar-root');
    document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    renderAlerts();

    const observer = new MutationObserver(() => {
      document.getElementById('main-wrapper').style.marginLeft = MaestroNav.getSidebarWidth() + 'px';
    });
    setTimeout(() => {
      const sb = document.getElementById('sidebar');
      if (sb) observer.observe(sb, { attributes: true, attributeFilter: ['class'] });
    }, 100);
  });

  function renderAlerts() {
    const statusStyles = {
      'Active':    { bg: 'var(--success-bg)', color: 'var(--success)',   label: 'Active',             tooltip: 'Monitoring for matching award seat availability' },
      'Triggered': { bg: 'var(--gold-bg)',    color: 'var(--gold)',      label: 'Availability Found', tooltip: 'A matching flight was found — see the AI Insight below' },
      'Paused':    { bg: 'var(--bg-surface-alt)', color: 'var(--text-muted)', label: 'Paused',        tooltip: 'Monitoring paused — no notifications will be sent' },
      'Expired':   { bg: 'var(--error-bg)',   color: 'var(--error)',     label: 'Expired',            tooltip: 'Alert date has passed' },
    };

    const programAbbreviations = {
      'Delta SkyMiles': 'Delta SM',
      'Air France Flying Blue': 'AF Flying Blue',
      'Singapore KrisFlyer': 'SQ KrisFlyer'
    };

    document.getElementById('stat-active').textContent    = ALERTS.filter(a => a.status === 'Active').length;
    document.getElementById('stat-triggered').textContent = ALERTS.filter(a => a.status === 'Triggered').length;
    document.getElementById('stat-paused').textContent    = ALERTS.filter(a => a.status === 'Paused').length;

    const clientSelect = document.getElementById('client-filter');
    CLIENTS.forEach(c => {
      const opt = document.createElement('option');
      opt.textContent = c.name;
      clientSelect.appendChild(opt);
    });

    if (!ALERTS || ALERTS.length === 0) {
      document.getElementById('alerts-body').innerHTML = `
        <tr>
          <td colspan="8" style="padding:48px 24px;text-align:center;border-bottom:none;">
            <div style="color:var(--text-muted);">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;opacity:0.4;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
              <div style="font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text-secondary);">No alerts configured yet</div>
              <div style="font-size:12px;margin-bottom:16px;">Set up an alert to get notified when award seats become available for your clients</div>
              <button class="btn-gold" style="font-size:12px;padding:6px 16px;" onclick="openAlertModal()">+ Create First Alert</button>
            </div>
          </td>
        </tr>`;
      return;
    }

    document.getElementById('alerts-body').innerHTML = ALERTS.map(a => {
      const client = getClient(a.clientId);
      const ss = statusStyles[a.status] || statusStyles['Active'];
      const programDisplay = programAbbreviations[a.program] || a.program;
      const aiNote = a.status === 'Triggered' ? `
        <tr>
          <td colspan="8" style="padding:4px 12px 10px;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--gold-bg);border-radius:var(--radius);border-left:3px solid var(--gold);">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:9999px;background:var(--gold);color:#000;font-size:10px;font-weight:700;white-space:nowrap;">
                <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
                AI Insight
              </span>
              <span style="font-size:12px;color:var(--text-secondary);">Found ${a.triggered} availability window${a.triggered > 1 ? 's' : ''}. Best option: ${a.dates.split('-')[0].trim()}, ${a.maxPoints} pts via ${programDisplay}.</span>
            </div>
          </td>
        </tr>` : '';
      return `
        <tr style="cursor:pointer;" onclick="openAlertDetailModal('${a.route}','${a.dates}','${a.cabin}','${a.maxPoints}','${programDisplay}','${client?.name}','${a.status}',${a.triggered})">
          <td><span class="font-semibold" style="color:var(--text-primary);">${a.route}</span></td>
          <td>${a.dates}</td>
          <td><span class="badge" style="background:var(--info-bg);color:var(--info);">${a.cabin}</span></td>
          <td style="font-weight:600;">${a.maxPoints}</td>
          <td class="text-xs">${programDisplay}</td>
          <td>
            <div class="flex items-center gap-2">
              <span class="avatar avatar-sm avatar-silhouette">${clientAvatarSVG()}</span>
              <a href="client-detail?id=${client?.id}" class="text-xs hover:underline" style="color:var(--text-primary);" onclick="event.stopPropagation()">${client?.name?.split(' ').slice(0,2).join(' ')}</a>
            </div>
          </td>
          <td><span class="badge" style="background:${ss.bg};color:${ss.color};" title="${ss.tooltip}">${ss.label}</span></td>
          <td>
            <span class="font-semibold" style="color:${a.triggered > 0 ? 'var(--gold)' : 'var(--text-muted)'};">${a.triggered}</span>
          </td>
        </tr>${aiNote}`;
    }).join('');
  }
</script>

</body>
</html>
